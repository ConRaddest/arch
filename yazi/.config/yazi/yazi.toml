# Yazi defaults: open editable files/folders in Code, media with viewers, fallback to xdg-open.

[mgr]
show_hidden = true

[opener]
edit = [
  { run = 'code --reuse-window "$@"', block = false, desc = "Code", for = "unix" },
]
view = [
  { run = 'imv "$@"', block = false, desc = "imv", for = "unix" },
  { run = 'xdg-open "$@"', block = false, desc = "Open", for = "unix" },
]
play = [
  { run = 'mpv "$@"', block = false, desc = "mpv", for = "unix" },
]
open = [
  { run = 'xdg-open "$@"', block = false, desc = "Open", for = "unix" },
]

[open]
rules = [
  # Folders and code/text files open in VS Code
  { mime = "inode/directory", use = ["edit"] },
  { mime = "inode/x-empty", use = ["edit"] },
  { mime = "text/*", use = ["edit"] },
  { mime = "application/{json,ld+json,javascript,typescript,x-yaml,toml,xml,x-sh,x-shellscript}", use = ["edit"] },
  { url = "*.{md,markdown,txt,log,csv,tsv,json,jsonc,yml,yaml,toml,xml,html,css,js,jsx,ts,tsx,py,sh,bash,zsh,fish,lua,nix,rs,go,c,cpp,h,hpp,java,kt,php,rb,sql,ini,conf,env}", use = ["edit"] },

  # Media
  { mime = "image/*", use = ["view", "edit"] },
  { mime = "{audio,video}/*", use = ["play"] },

  # Fallback
  { mime = "*", use = ["open"] },
]
