# Generated from ~/OS/home/kitty.nix using ~/OS/themes/tokyo-night/theme.nix

font_family JetBrainsMono Nerd Font
font_size 11
window_padding_width 8
confirm_os_window_close 0
enable_audio_bell no
open_url_with /home/cdt/.config/kitty/open-url.sh

# Use zsh so Starship is loaded from ~/.zshrc
shell /usr/bin/zsh

background #1a1b26
foreground #c0caf5
cursor #c0caf5
cursor_text_color #1a1b26
selection_background #292e42
selection_foreground #c0caf5

# Normal colors
color0 #32344a
color1 #f7768e
color2 #9ece6a
color3 #e0af68
color4 #7aa2f7
color5 #bb9af7
color6 #449dab
color7 #565f89

# Bright colors
color8 #292e42
color9 #f7768e
color10 #9ece6a
color11 #ff9e64
color12 #7aa2f7
color13 #bb9af7
color14 #449dab
color15 #a9b1d6

# Keybindings
map shift+delete copy_to_clipboard
map ctrl+insert copy_to_clipboard
map shift+insert paste_from_clipboard
